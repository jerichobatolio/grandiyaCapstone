# Railway deploy config for Laravel (Grandiya)
# https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "composer install --no-dev --optimize-autoloader && npm ci && npm run build"

[deploy]
# Must listen on 0.0.0.0 and PORT so Railway can reach the app (prevents crash)
startCommand = "sh -c 'php artisan config:clear 2>/dev/null || true; php artisan migrate --force 2>/dev/null || true; php artisan storage:link 2>/dev/null || true; exec php artisan serve --host=0.0.0.0 --port=$PORT'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
